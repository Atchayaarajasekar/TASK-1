<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        h1 {
            margin: 20px;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Popup */
        #popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
        }

        #popup img {
            max-width: 80%;
            max-height: 80%;
            margin-top: 5%;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            margin: 10px;
            border: none;
            background: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>My Image Gallery</h1>

<div class="gallery">
    <img src="f1.jpg" onclick="openImg(0)">
    <img src="f2.jpg" onclick="openImg(1)">
    <img src="f3.jpg" onclick="openImg(2)">
    <img src="f4.jpg" onclick="openImg(3)">
    <img src="f5.jpg" onclick="openImg(4)">
    <img src ="f6.jpg" onclick = "openImg(5)">
  <img src ="f7.jpg" onclick = "openImg(6)">
<img src ="f8.jpg" onclick = "openImg(7)">
</div>

<!-- Popup Viewer -->
<div id="popup">
    <br>
    <button onclick="prevImage()">⬅</button>
    <button onclick="nextImage()">➡</button>
    <br>
    <img id="popupImg">
    <br>
    <button onclick="closeImg()">Close</button>
</div>

<script>
let images = [
"f1.jpg",
"f2.jpg",
"f3.jpg",
"f4.jpg",
"f5.jpg",
"f6.jpg",
"f7.jpg",
"f8.jpg"
];

let index = 0;

function openImg(i) {
    index = i;
    document.getElementById("popup").style.display = "block";
    document.getElementById("popupImg").src = images[index];
}

function closeImg() {
    document.getElementById("popup").style.display = "none";
}

function nextImage() {
    index++;
    if(index >= images.length) index = 0;
    document.getElementById("popupImg").src = images[index];
}

function prevImage() {
    index--;
    if(index < 0) index = images.length - 1;
    document.getElementById("popupImg").src = images[index];
}
</script>

</body>
</html>
